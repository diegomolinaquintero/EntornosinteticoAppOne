{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no, viewport-fit=cover">
    <title>ENTORNO SINTÉTICO // DIRECTO</title>
    <link rel="stylesheet" href="{% static 'core/style.css' %}">
</head>
<body>
    <header class="sys-header">
        <span class="blink">></span> ENTORNO SINTÉTICO [Dron Sintético] // DIRECTO
    </header>
    
    <main class="grid-layout">
        <section class="module box-dron">
            <h2 class="module-title">DRON_CENTRAL.exe // FLUIDEZ ACTIVA</h2>
            <div class="canvas-wrapper">
                <canvas id="dron-canvas" touch-action="none"></canvas>
            </div>
            <div id="dron-status" class="status-bar">MODO ESPERA</div>
        </section>

        <section class="module box-ensamble">
            <h2 class="module-title">ENSAMBLE_CUANTIZADO.sys // POLIFONÍA</h2>
            <div id="pad-grid"></div>
        </section>

        <section class="module box-efimero">
            <h2 class="module-title">MEMORIA_VOLATIL.sh & FX_MASTER.sys</h2>
            
            <div class="efimero-fx-layout">
                <div class="efimero-controls">
                    <label for="audio-upload" class="btn btn-small">INYECCIÓN RAM</label>
                    <input type="file" id="audio-upload" accept="audio/*">
                    
                    <div id="playback-buttons" style="display: none;">
                        <button id="play-efimero" class="btn btn-small">PLAY [LOOP]</button>
                        <button id="stop-efimero" class="btn btn-small">PURGAR</button>
                    </div>
                    <div id="file-status" class="status-bar status-small">RAM VACÍA</div>
                </div>

                <div class="fx-panel">
                    <div class="fx-knob">
                        <label>REVERB <span id="val-rev">0%</span></label>
                        <input type="range" id="fx-reverb" min="0" max="100" value="0">
                    </div>
                    <div class="fx-knob">
                        <label>DELAY <span id="val-del">0%</span></label>
                        <input type="range" id="fx-delay" min="0" max="100" value="0">
                    </div>
                    <div class="fx-knob">
                        <label>CHORUS <span id="val-cho">0%</span></label>
                        <input type="range" id="fx-chorus" min="0" max="100" value="0">
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="{% static 'core/js/engine.js' %}"></script>
</body>
</html>
